name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Core lab is dependency-free. Install dev (pytest); kuzu is best-effort so
      # the DB-backend tests run where a wheel exists and auto-skip otherwise.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install kuzu || echo "no kuzu wheel for this Python — kuzu tests will skip"

      - name: Run tests
        run: pytest -q
